name: ci

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # Pure jsdom React tests (Tauri APIs mocked). Run on Linux: vitest's worker
  # teardown hangs indefinitely on the windows-latest runner, and these tests
  # are platform-agnostic (they pass identically + in seconds on Linux).
  frontend:
    name: Frontend tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx vitest run

  # Rust tests genuinely need Windows (registry / context-menu helpers).
  rust:
    name: Rust tests (Windows)
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run Rust tests (including Windows registry helpers)
        working-directory: src-tauri
        env:
          BITBURN_CONTEXT_ROOT: "Software\\Classes\\BitBurnCI"
        run: cargo test --locked
